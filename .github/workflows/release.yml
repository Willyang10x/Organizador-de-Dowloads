name: Gerar Executáveis e Lançar Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build e Empacotamento
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Baixar o código do repositório
        uses: actions/checkout@v4

      - name: ⚙️ Configurar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Instalar o pkg
        run: npm install -g pkg

      - name: 🔨 Compilar binários (Windows e Linux)

        run: pkg . --targets "node18-win-x64,node18-linux-x64" --out-path dist/

      - name: 🐧 Criar o Instalador Linux (.deb)
        run: |
          # Cria as pastas do padrão Debian
          mkdir -p dist/organizador_1.0.0_amd64/usr/local/bin
          mkdir -p dist/organizador_1.0.0_amd64/DEBIAN
          
          # Move o binário gerado pelo pkg e dá permissão
          # ATENÇÃO: Se o nome "name" no seu package.json for diferente de "organizador-downloads", mude a linha abaixo!
          cp dist/organizador-downloads dist/organizador_1.0.0_amd64/usr/local/bin/organizador
          chmod +x dist/organizador_1.0.0_amd64/usr/local/bin/organizador
          
          # Cria o arquivo de configuração de forma automática
          cat <<EOF > dist/organizador_1.0.0_amd64/DEBIAN/control
          Package: organizador
          Version: 1.0.0
          Architecture: amd64
          Maintainer: Dev <dev@exemplo.com>
          Description: Organizador automatico de downloads.
          EOF
          
          # Constrói o arquivo .deb final
          dpkg-deb --build dist/organizador_1.0.0_amd64
          mv dist/organizador_1.0.0_amd64.deb dist/organizador-linux.deb

      - name: 🚀 Publicar no GitHub Releases
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}